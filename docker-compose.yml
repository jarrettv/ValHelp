services:
  valhelp-db:
    image: postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: valhelp
    volumes:
      - ./pgdata:/var/lib/postgresql/data
  
  # Seed POI generator: runs Valheim dedicated server headless to extract
  # accurate boss/trader/start locations from seeds.
  # Polls seed_gen_jobs table, processes one seed at a time (~60s each).
  # Start:  docker compose --profile seedgen up -d valhelp-seedgen
  # Logs:   docker compose --profile seedgen logs -f valhelp-seedgen
  # One-shot (no DB): docker compose run --rm valhelp-seedgen /entrypoint.sh "huntYR6F4J"
  valhelp-seedgen:
    profiles: ["seedgen"]
    build:
      context: ./seedgen
    restart: unless-stopped
    depends_on:
      - valhelp-db
    environment:
      DATABASE_URL: "Host=valhelp-db;Port=5432;Database=valhelp;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"

  valhelp-otel:
    image: mcr.microsoft.com/dotnet/aspire-dashboard:latest
    restart: always
    ports:
      - "18888:18888"
      - "4317:18889"
    environment:
      DOTNET_DASHBOARD_UNSECURED_ALLOW_ANONYMOUS: "true"

  # Runs `pgsync` on a fixed interval (default: every 4 hours).
  # Setup:
  #   - copy .env.pgsync.example -> .env.pgsync
  #   - copy pgsync/config/.pgsync.yml.example -> pgsync/config/.pgsync.yml
  # Run continuously:
  #   docker compose --profile pgsync up -d valhelp-pgsync
  # Run once:
  #   docker compose --profile pgsync run --rm -e RUN_ONCE=1 valhelp-pgsync
  valhelp-pgsync:
    profiles: ["pgsync"]
    build:
      context: ./pgsync
    restart: always
    env_file:
      - .env.pgsync
    environment:
      PGSYNC_CONFIG_DIR: /config
      PGSYNC_INTERVAL_SECONDS: 14400
    volumes:
      - ./pgsync/config:/config:ro
      - ./pgsync/logs:/logs